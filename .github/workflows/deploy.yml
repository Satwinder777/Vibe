name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: droplink/package-lock.json

      - name: Install dependencies
        working-directory: droplink
        run: npm ci

      - name: Build
        working-directory: droplink
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          NEXT_PUBLIC_MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
          NEXT_PUBLIC_MEGA_FOLDER_NAME: vibe
          NEXT_PUBLIC_APP_URL: https://satwinder777.github.io/Vibe
          NEXT_PUBLIC_BASE_PATH: /Vibe
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: droplink/out
          publish_branch: gh-pages
