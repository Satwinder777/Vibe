name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: droplink/package-lock.json

      - name: Install dependencies
        working-directory: droplink
        run: npm ci

      - name: Build
        working-directory: droplink
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          NEXT_PUBLIC_MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
          NEXT_PUBLIC_MEGA_FOLDER_NAME: vibe
          NEXT_PUBLIC_APP_URL: https://satwinder777.github.io/Vibe
          NEXT_PUBLIC_BASE_PATH: /Vibe
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: droplink/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
